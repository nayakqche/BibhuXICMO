version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: xicmo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xicmo
      POSTGRES_PASSWORD: xicmo
      POSTGRES_DB: xicmo
    ports:
      - "5432:5432"
    volumes:
      - xicmo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xicmo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xicmo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - xicmo_redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  xicmo_pgdata:
  xicmo_redisdata:
