           C188 62 200 74 200 92
           L200 120
           L232 120
           L232 92
           C232 56 212 30 172 30
           Z"
        fill="url(#copilotTop)"/>
  <path d="M170 210
           C208 210 228 184 228 148
           C228 112 208 88 170 88
           L120 88
           L120 120
           L166 120
           C186 120 196 132 196 148
           C196 166 184 178 162 178
           L72 178
           C52 178 40 166 40 148
           L40 120
           L8 120
           L8 148
           C8 184 28 210 68 210
           Z"
        fill="url(#copilotBot)"/>
</svg>
