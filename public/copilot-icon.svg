<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <linearGradient id="copilotTop" x1="20" y1="40" x2="220" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#36D7FF"/>
      <stop offset="0.45" stop-color="#1A89D9"/>
      <stop offset="1" stop-color="#39BD78"/>
    </linearGradient>
    <linearGradient id="copilotBot" x1="40" y1="200" x2="220" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8534"/>
      <stop offset="0.5" stop-color="#E66A8C"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
  </defs>
  <!--
    Microsoft Copilot mark — two interlocking ribbon loops.
    Top loop (cool gradient) opens to the lower-right, bottom loop
    (warm gradient) opens to the upper-left, overlapping at the centre.
  -->
