<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <!-- Clips the red arc so it only appears where the magnifier ring
         overlaps the green bar. -->
    <clipPath id="gscGreenBar">
      <rect x="96" y="80" width="64" height="148" rx="32"/>
    </clipPath>
  </defs>
  <!-- Tall blue bar (right) -->
  <rect x="168" y="32" width="64" height="196" rx="32" fill="#4285F4"/>
  <!-- Medium green bar (middle) -->
  <rect x="96" y="80" width="64" height="148" rx="32" fill="#34A853"/>
  <!-- Magnifier handle (yellow), drawn before the ring so the ring
       sits on top of the joint -->
  <line x1="56" y1="184" x2="28" y2="212" stroke="#FBBC04"
        stroke-width="22" stroke-linecap="round"/>
  <!-- Magnifier ring (yellow) -->
  <circle cx="88" cy="152" r="40" stroke="#FBBC04" stroke-width="18"/>
  <!-- Red segment: same ring stroked red, clipped to the green bar's box
       so only the overlap with the green bar shows. -->
  <circle cx="88" cy="152" r="40" stroke="#EA4335" stroke-width="18"
          clip-path="url(#gscGreenBar)"/>
</svg>
