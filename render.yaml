


# Render Blueprint for XIcmo
# https://render.com/docs/blueprint-spec
#
# Deploy with one click:
#   1. Push this file to GitHub (already done if you're using BibhuXICMO).
#   2. Render Dashboard → New → Blueprint → connect this repo → Apply.
#   3. After the first deploy succeeds, open the web service → "Environment"
#      tab → fill in the keys that are listed as "sync: false" below
#      (e.g. ANTHROPIC_API_KEY, APIFY_TOKEN).
#   4. Add a custom domain if you want, or use the *.onrender.com URL.
#
# Plans: everything is on Render's free tier for first deploy. Upgrade the
# web service + database to "starter" once you have traffic — the free web
# tier spins down after 15 min idle, which adds cold-start latency.

databases:
  - name: xicmo-db
    plan: free
    databaseName: xicmo
    user: xicmo
    postgresMajorVersion: 16

services:
  # ------------------------------------------------------------------
  # Redis (Render Key Value) — used by BullMQ for job queue + rate limit
  # ------------------------------------------------------------------
  - type: keyvalue
    name: xicmo-redis
    plan: free
    ipAllowList: []   # empty list = only accessible from inside Render

  # ------------------------------------------------------------------
  # Web service — the Next.js app itself
  # ------------------------------------------------------------------
  - type: web
    name: xicmo-web
    runtime: node
    plan: free
    region: oregon              # change to "frankfurt" or "singapore" if closer to you
    # Render sets NODE_ENV=production which makes `npm install` skip
    # devDependencies. tailwindcss/postcss/autoprefixer live there and are
    # needed at build time, so force-include dev deps just for the build.
    buildCommand: npm install --include=dev && npm run build
    # `prisma db push` runs in startCommand (instead of preDeployCommand)
    # so the free tier is happy — pre-deploy hooks are paid-only on Render.
    # The push is idempotent, so re-running on every cold start is safe.
    startCommand: npx prisma db push --skip-generate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: xicmo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: xicmo-redis
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true       # Render generates a long random string
      # Render automatically sets RENDER_EXTERNAL_URL, but the app reads
      # NEXT_PUBLIC_APP_URL / APP_URL. Fill these in after first deploy
      # using the *.onrender.com URL Render assigns (or your custom domain).
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: AUTH_URL
        sync: false

      # ----- LLM keys (add what you have) -----
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

      # ----- Apify (Ahrefs scraper + X tweet search) -----
      - key: APIFY_TOKEN
        sync: false
      # Optional: dedicated Apify token for the X agent. If unset, the X
      # agent falls back to APIFY_TOKEN. Useful when you want Ahrefs and
      # X tweet scraping to bill against separate Apify accounts.
      - key: APIFY_X_TOKEN
        sync: false
      - key: APIFY_AHREFS_ACTOR_ID
        value: radeance~ahrefs-scraper
      - key: APIFY_X_ACTOR_ID
        value: apidojo~tweet-scraper
      # Apify Google SERP scraper used by the GEO agent's AI Overviews probe.
      # Override only if you use a custom variant; default is the public actor.
      - key: APIFY_GOOGLE_SERP_ACTOR_ID
        value: apify~google-search-scraper

      # ----- X / Twitter OAuth (for posting drafts) -----
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false

      # ----- Facebook Login (for Instagram Business connect) -----
      # Required for Path A of the Instagram agent (Graph API posting + comments).
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false

      # ----- Apify Instagram scrapers (reads + DM automation) -----
      # Optional dedicated token — falls back to APIFY_TOKEN.
      - key: APIFY_IG_TOKEN
        sync: false
      - key: APIFY_IG_ACTOR_ID
        value: apify~instagram-scraper
      - key: APIFY_IG_HASHTAG_ACTOR_ID
        value: apify~instagram-hashtag-scraper
      - key: APIFY_IG_DM_ACTOR_ID
        value: quickads~instagram-dm-automation
      # Network-expansion scraper used by /agents/instagram InfluencerFind.
      # Takes 1–5 seed handles and returns similar creators with email,
      # engagement rate, and a Quality label in one call.
      - key: APIFY_IG_NETWORK_ACTOR_ID
        value: afanasenko~instagram-profile-scraper

      # ----- Apify SEO + GEO keyword tools -----
      # Optional dedicated Apify token for the keyword tools on /agents/seo
      # and /agents/geo (KD, Metrics, Rank, SERP, Top Sites, AI Visibility,
      # AI Overview, Top AI-cited). Falls back to APIFY_TOKEN when unset.
      - key: APIFY_SEO_TOKEN
        sync: false

      # ----- Apify LinkedIn agent (HarvestAPI scrapers) -----
      # One Apify API key per actor (paste each separately). Each falls back
      # to APIFY_LINKEDIN_TOKEN, then APIFY_TOKEN, if left blank.
      - key: APIFY_LINKEDIN_PROFILE_TOKEN
        sync: false
      - key: APIFY_LINKEDIN_POSTS_TOKEN
        sync: false
      # Optional shared fallback token for both actors.
      - key: APIFY_LINKEDIN_TOKEN
        sync: false
      # Actor IDs (not secrets) — leave as-is.
      - key: APIFY_LINKEDIN_PROFILE_ACTOR_ID
        value: harvestapi~linkedin-profile-scraper
      - key: APIFY_LINKEDIN_COMPANY_POSTS_ACTOR_ID
        value: harvestapi~linkedin-company-posts

      # ----- YouTube creator discovery (Google YT Data API v3) -----
      # Get a key at https://console.cloud.google.com/apis/credentials
      # after enabling the "YouTube Data API v3" service. 10 000-unit
      # free tier ≈ 99 keyword searches/day with channel enrichment.
      - key: YOUTUBE_API_KEY
        sync: false

      # ----- Google PageSpeed (free site-audit Lighthouse scores) -----
      - key: PAGESPEED_API_KEY
        sync: false

      # ----- OAuth providers (optional — "Continue with Google/GitHub") -----
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

      # ----- Stripe billing (optional) -----
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_MAX_MONTHLY
        sync: false

      # ----- Email (Resend — for password resets) -----
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Xicmo <hello@xicmo.com>

      # ----- Cron secret (used by the cron jobs you may add later) -----
      - key: CRON_SECRET
        generateValue: true
